name: Daily Deal Update
on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:
jobs:
  update-deals:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Run Python deal updater
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Python version: $(python3 --version)"
          echo "API key set: $([[ -n "$ANTHROPIC_API_KEY" ]] && echo YES || echo NO)"
          python3 update-deals-action.py
      - name: Commit changes
        if: success()
        run: |
          git config user.name "Scoop Deals Bot"
          git config user.email "bot@myscoopdeals.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Daily deals $(date +%Y-%m-%d)"
          git push
